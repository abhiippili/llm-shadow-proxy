name: Deploy to DO App Platform

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Validate app spec
        run: doctl apps spec validate infra/app-platform/app.yaml

      - name: Deploy to App Platform
        run: |
          if [ -n "${{ secrets.DO_APP_ID }}" ]; then
            echo "Updating existing app ${{ secrets.DO_APP_ID }}"
            doctl apps update ${{ secrets.DO_APP_ID }} --spec infra/app-platform/app.yaml
          else
            echo "Creating new app"
            doctl apps create --spec infra/app-platform/app.yaml
          fi
