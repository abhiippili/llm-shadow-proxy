name: llm-shadow-proxy
region: blr

services:
  - name: proxy
    github:
      repo: abhiippili/llm-shadow-proxy
      branch: main
      deploy_on_push: false
    source_dir: services/proxy
    dockerfile_path: services/proxy/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: PRIMARY_LLM_URL
        value: http://primary-llm:8001
      - key: CANDIDATE_LLM_URL
        value: http://candidate-llm:8002
      - key: JUDGE_URL
        value: http://judge:8003
      - key: MONGODB_URL
        scope: RUN_TIME
        type: SECRET
      - key: MONGODB_DB_NAME
        value: shadowproxy
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: ENV
        value: production
      - key: PRIMARY_TIMEOUT
        value: "10"
      - key: CANDIDATE_TIMEOUT
        value: "30"
      - key: JUDGE_TIMEOUT
        value: "10"
      - key: DIVERGENCE_RATE
        value: "0.3"
      - key: RESPONSE_DELAY_SECONDS
        value: "0"

  - name: primary-llm
    github:
      repo: abhiippili/llm-shadow-proxy
      branch: main
      deploy_on_push: false
    source_dir: services/primary-llm
    dockerfile_path: services/primary-llm/Dockerfile
    internal_ports:
      - 8001
    instance_count: 1
    instance_size_slug: basic-xxs

  - name: candidate-llm
    github:
      repo: abhiippili/llm-shadow-proxy
      branch: main
      deploy_on_push: false
    source_dir: services/candidate-llm
    dockerfile_path: services/candidate-llm/Dockerfile
    internal_ports:
      - 8002
    instance_count: 1
    instance_size_slug: basic-xxs

  - name: judge
    github:
      repo: abhiippili/llm-shadow-proxy
      branch: main
      deploy_on_push: false
    source_dir: services/judge
    dockerfile_path: services/judge/Dockerfile
    internal_ports:
      - 8003
    instance_count: 1
    instance_size_slug: basic-xxs
