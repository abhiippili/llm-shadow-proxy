name: llm-shadow-proxy

services:
  - name: proxy
    source_dir: services/proxy
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /

  - name: primary-llm
    source_dir: services/primary-llm
    http_port: 8001
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /primary

  - name: candidate-llm
    source_dir: services/candidate-llm
    http_port: 8002
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /candidate

  - name: judge
    source_dir: services/judge
    http_port: 8003
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /judge
